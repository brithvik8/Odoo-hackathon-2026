<!DOCTYPE html>
<html>
<head>

<title>Fuel & Expense Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0f172a;
color:white;
}

.sidebar{
position:fixed;
width:240px;
height:100vh;
background:#111827;
padding:20px;
}

.sidebar h2{
text-align:center;
color:#00E5A8;
margin-bottom:25px;
}

.sidebar button{
width:100%;
padding:14px;
margin:8px 0;
background:#1f2937;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.sidebar button:hover{
background:#00E5A8;
color:black;
}

.main{
margin-left:260px;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
}

.card h3{
color:#9ca3af;
}

.card h1{
margin-top:10px;
color:#00E5A8;
}

.form{
background:#1e293b;
padding:25px;
border-radius:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
}

button.save{
margin-top:25px;
width:100%;
padding:15px;
background:#00E5A8;
border:none;
border-radius:15px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
}

th{
background:#00E5A8;
color:black;
padding:12px;
}

td{
padding:12px;
text-align:center;
background:#1e293b;
}

.result{
margin-top:25px;
background:#111827;
padding:20px;
border-radius:15px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>🚍 TransitOps</h2>

<button>Dashboard</button>
<button>Vehicle Registry</button>
<button>Drivers</button>
<button>Trip Dispatcher</button>
<button>Maintenance</button>
<button style="background:#00E5A8;color:black;">Fuel & Expenses</button>
<button>Reports</button>
<button>Settings</button>

</div>

<div class="menu">

<button style="background:#00ffcc;color:black;" onclick="window.location.href='dashboard.html'">
📊 Dashboard
</button>

<button onclick="window.location.href='vehicle registry.html'">
🚍 Vehicle Registry
</button>

<button onclick="window.location.href='driverprofile.html'">
👨‍✈️ Driver Profiles
</button>

<button onclick="window.location.href='trip dispatcher.html'">
🗺 Trip Dispatcher
</button>

<button onclick="window.location.href='maintenance.html'">
🔧 Maintenance
</button>

<button onclick="window.location.href='fuel expenses.html'">
⛽ Fuel & Expenses
</button>

<button onclick="window.location.href='reports.html'">
📈 Reports
</button>

<button onclick="window.location.href='settings.html'">
⚙ Settings
</button>

</div>

</div>
<script>

function calculate(){

let litres=parseFloat(document.getElementById("litres").value);

let price=parseFloat(document.getElementById("price").value);

let distance=parseFloat(document.getElementById("distance").value);

let expense=parseFloat(document.getElementById("expense").value);

let vehicle=document.getElementById("vehicle").value;

if(isNaN(litres)||isNaN(price)||isNaN(distance)||isNaN(expense))
{
alert("Please fill all fields");
return;
}

let fuelCost=litres*price;

let total=fuelCost+expense;

let mileage=(distance/litres).toFixed(2);

document.getElementById("result").innerHTML=`

<h2 style="color:#00E676;">Expense Recorded Successfully ✅</h2>

<br>

<b>Vehicle :</b> ${vehicle}<br><br>

<b>Fuel Cost :</b> ₹${fuelCost.toFixed(2)}<br><br>

<b>Other Expense :</b> ₹${expense}<br><br>

<b>Total Expense :</b> ₹${total.toFixed(2)}<br><br>

<b>Mileage :</b> ${mileage} km/L

`;

}

</script>

</body>
</html>
