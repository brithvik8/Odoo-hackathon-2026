<!DOCTYPE html>
<html>
<head>

<title>Fuel & Expense Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0f172a;
color:white;
}

.sidebar{
position:fixed;
width:240px;
height:100vh;
background:#111827;
padding:20px;
}

.sidebar h2{
text-align:center;
color:#00E5A8;
margin-bottom:25px;
}

.sidebar button{
width:100%;
padding:14px;
margin:8px 0;
background:#1f2937;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.sidebar button:hover{
background:#00E5A8;
color:black;
}

.main{
margin-left:260px;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
}

.card h3{
color:#9ca3af;
}

.card h1{
margin-top:10px;
color:#00E5A8;
}

.form{
background:#1e293b;
padding:25px;
border-radius:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
}

button.save{
margin-top:25px;
width:100%;
padding:15px;
background:#00E5A8;
border:none;
border-radius:15px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
}

th{
background:#00E5A8;
color:black;
padding:12px;
}

td{
padding:12px;
text-align:center;
background:#1e293b;
}

.result{
margin-top:25px;
background:#111827;
padding:20px;
border-radius:15px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>🚍 TransitOps</h2>

<button>Dashboard</button>
<button>Vehicle Registry</button>
<button>Drivers</button>
<button>Trip Dispatcher</button>
<button>Maintenance</button>
<button style="background:#00E5A8;color:black;">Fuel & Expenses</button>
<button>Reports</button>
<button>Settings</button>

</div>

<div class="main">

<h1>Fuel & Expense Management</h1>

<br>

<div class="cards">

<div class="card">
<h3>Total Fuel Cost</h3>
<h1>₹2,45,000</h1>
</div>

<div class="card">
<h3>Total Expenses</h3>
<h1>₹3,18,000</h1>
</div>

<div class="card">
<h3>Average Mileage</h3>
<h1>8.6 km/L</h1>
</div>

<div class="card">
<h3>Monthly Budget</h3>
<h1>78%</h1>
</div>

</div>

<div class="form">

<div class="grid">

<div>

<label>Vehicle Number</label>

<select id="vehicle">
<option>TS08HK2058</option>
<option>TS09AB4567</option>
<option>AP05XY7890</option>
</select>

</div>

<div>

<label>Fuel Type</label>

<select id="fuel">
<option>Diesel</option>
<option>Petrol</option>
<option>CNG</option>
</select>

</div>

<div>

<label>Fuel Quantity (Litres)</label>

<input type="number" id="litres">

</div>

<div>

<label>Fuel Price / Litre (₹)</label>

<input type="number" id="price">

</div>

<div>

<label>Trip Distance (KM)</label>

<input type="number" id="distance">

</div>

<div>

<label>Other Expense (₹)</label>

<input type="number" id="expense">

</div>

</div>

<button class="save" onclick="calculate()">

💾 Save Expense

</button>

<div class="result" id="result">

Waiting for Data...

</div>

<table>

<tr>

<th>Vehicle</th>
<th>Fuel Cost</th>
<th>Other Expense</th>
<th>Total Cost</th>

</tr>

<tr>

<td>TS08HK2058</td>
<td>₹18,200</td>
<td>₹2,300</td>
<td>₹20,500</td>

</tr>

<tr>

<td>AP05XY7890</td>
<td>₹11,800</td>
<td>₹1,100</td>
<td>₹12,900</td>

</tr>

</table>

</div>

</div>

<script>

function calculate(){

let litres=parseFloat(document.getElementById("litres").value);

let price=parseFloat(document.getElementById("price").value);

let distance=parseFloat(document.getElementById("distance").value);

let expense=parseFloat(document.getElementById("expense").value);

let vehicle=document.getElementById("vehicle").value;

if(isNaN(litres)||isNaN(price)||isNaN(distance)||isNaN(expense))
{
alert("Please fill all fields");
return;
}

let fuelCost=litres*price;

let total=fuelCost+expense;

let mileage=(distance/litres).toFixed(2);

document.getElementById("result").innerHTML=`

<h2 style="color:#00E676;">Expense Recorded Successfully ✅</h2>

<br>

<b>Vehicle :</b> ${vehicle}<br><br>

<b>Fuel Cost :</b> ₹${fuelCost.toFixed(2)}<br><br>

<b>Other Expense :</b> ₹${expense}<br><br>

<b>Total Expense :</b> ₹${total.toFixed(2)}<br><br>

<b>Mileage :</b> ${mileage} km/L

`;

}

</script>

</body>
</html>
