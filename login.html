<!DOCTYPE html>
<html>

<head>

<title>TransitOps Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}


body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(135deg,#020617,#0f172a,#1e3a8a);

}


/* Main Card */

.login-container{

    width:420px;

    background:rgba(255,255,255,0.1);

    backdrop-filter:blur(20px);

    padding:35px;

    border-radius:25px;

    color:white;

    box-shadow:
    0 25px 50px rgba(0,0,0,0.5);

}



/* Logo */


.logo{

    text-align:center;

    margin-bottom:25px;

}


.logo h1{

    font-size:36px;

    color:#38bdf8;

}


.logo p{

    color:#cbd5e1;

    margin-top:8px;

}



/* Inputs */


label{

    display:block;

    margin-top:18px;

    font-size:14px;

    color:#e2e8f0;

}



.input-box{

    position:relative;

}


input,select{

    width:100%;

    padding:13px;

    margin-top:7px;

    border-radius:12px;

    border:none;

    outline:none;

    background:#f8fafc;

    font-size:15px;

}



.show{

    position:absolute;

    right:12px;

    top:18px;

    cursor:pointer;

    color:#2563eb;

    font-size:13px;

}



/* Captcha */


.captcha{

    margin-top:10px;

    background:#020617;

    padding:15px;

    text-align:center;

    border-radius:12px;

    font-size:24px;

    letter-spacing:6px;

    color:#22c55e;

    font-weight:bold;

}



/* Button */


button{

    width:100%;

    margin-top:25px;

    padding:14px;

    border:none;

    border-radius:30px;

    background:#2563eb;

    color:white;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;

}



button:hover{

    background:#1d4ed8;

    transform:scale(1.03);

}



/* Remember */


.remember{

    margin-top:15px;

    display:flex;

    gap:8px;

    align-items:center;

}



/* Message */


.message{

    text-align:center;

    margin-top:15px;

    font-weight:bold;

}



/* Demo */

.demo{

    margin-top:25px;

    padding:15px;

    background:rgba(255,255,255,0.1);

    border-radius:15px;

    font-size:13px;

}


</style>


</head>



<body>



<div class="login-container">


<div class="logo">

<h1>🚍 TransitOps</h1>

<p>
Smart Transport Operations Platform
</p>

</div>



<label>Email Address</label>

<input id="email"
placeholder="Enter email">



<label>Password</label>


<div class="input-box">

<input id="password"
type="password"
placeholder="Enter password">


<span class="show"
onclick="showPassword()">

Show

</span>


</div>





<label>Login Role</label>


<select id="role">


<option>
Fleet Manager
</option>


<option>
Dispatcher
</option>


<option>
Safety Officer
</option>


<option>
Financial Analyst
</option>


</select>





<label>Security Verification</label>


<div class="captcha" id="captcha">

</div>


<input id="captchaInput"
placeholder="Enter answer">





<div class="remember">

<input type="checkbox">

<span>
Remember me
</span>

</div>





<button onclick="login()">

LOGIN

</button>



<div class="message"
id="message">

</div>





<div class="demo">

<b>Demo Login:</b>

<br><br>

Manager:
manager@transitops.com

<br>

Password:
12345

<br><br>

Dispatcher:
dispatcher@transitops.com

<br>

Password:
12345


</div>



</div>







<script>


let x,y;



function generateCaptcha(){


x=Math.floor(Math.random()*9)+1;

y=Math.floor(Math.random()*9)+1;


document.getElementById("captcha")
.innerHTML=
x+" + "+y+" = ?";


}


generateCaptcha();






function showPassword(){


let pass=document.getElementById("password");


if(pass.type==="password"){

pass.type="text";

}

else{

pass.type="password";

}


}






function login(){


let email=
document.getElementById("email").value;


let password=
document.getElementById("password").value;


let captcha=
document.getElementById("captchaInput").value;



let role=
document.getElementById("role").value;





if(email==""||password==""){


display(
"Please enter login details ❌",
"red"
);

return;


}



if(Number(captcha)!=(x+y)){


display(
"Wrong CAPTCHA ❌",
"red"
);


generateCaptcha();

return;


}




// Demo authentication


if(password==="12345"){



localStorage.setItem(
"user",
email
);


localStorage.setItem(
"role",
role
);



display(
"Login Successful ✅",
"#22c55e"
);



setTimeout(()=>{

alert(
"Welcome "+role+
"\nOpening Dashboard..."
);


},1000);



}

else{


display(
"Invalid Password ❌",
"red"
);


}



}





function display(text,color){

let msg=
document.getElementById("message");


msg.innerHTML=text;

msg.style.color=color;


}


</script>



</body>

</html>
