<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TransitOps - Maintenance</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* Sidebar */

.sidebar{

position:fixed;

left:0;

top:0;

width:250px;

height:100vh;

background:#111827;

padding:20px;

}

.sidebar h2{

color:#00d4ff;

margin-bottom:30px;

}

.sidebar a{

display:block;

color:white;

text-decoration:none;

padding:12px;

margin:8px 0;

border-radius:10px;

transition:.3s;

}

.sidebar a:hover{

background:#00d4ff;

color:#111827;

}

/* Main */

.main{

margin-left:250px;

padding:30px;

}

/* Cards */

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:30px;

}

.card{

background:#1e293b;

padding:25px;

border-radius:20px;

box-shadow:0 8px 20px rgba(0,0,0,.4);

}

.card h3{

color:#94a3b8;

}

.card h1{

margin-top:15px;

color:#00d4ff;

}

/* Form */

.form{

background:#1e293b;

padding:25px;

border-radius:20px;

margin-bottom:30px;

}

.form input,
.form select{

width:100%;

padding:12px;

margin:10px 0;

border:none;

border-radius:10px;

font-size:15px;

}

button{

background:#00d4ff;

color:#111827;

padding:12px 20px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

}

button:hover{

background:#22c55e;

}

/* Table */

table{

width:100%;

border-collapse:collapse;

background:#1e293b;

border-radius:20px;

overflow:hidden;

}

th{

background:#2563eb;

padding:15px;

}

td{

padding:15px;

text-align:center;

border-bottom:1px solid #334155;

}

.status1{

color:#22c55e;

font-weight:bold;

}

.status2{

color:#f59e0b;

font-weight:bold;

}

.status3{

color:#ef4444;

font-weight:bold;

}

</style>

</head>

<body>

<div class="sidebar">

<h2>🚍 TransitOps</h2>

</div>

📊 Dashboard

</button>

<script>

function addMaintenance(){

let reg=document.getElementById("reg").value;

let issue=document.getElementById("issue").value;

let cost=document.getElementById("cost").value;

let status=document.getElementById("status").value;

if(reg==""||issue==""||cost==""){

alert("Please fill all fields");

return;

}

let table=document.getElementById("table");

let row=table.insertRow(-1);

row.insertCell(0).innerHTML=reg;

row.insertCell(1).innerHTML=issue;

row.insertCell(2).innerHTML="₹"+cost;

row.insertCell(3).innerHTML=status;

document.getElementById("reg").value="";
document.getElementById("issue").value="";
document.getElementById("cost").value="";

alert("Maintenance Record Added Successfully!");

}

</script>

</body>
