<!DOCTYPE html>
<html>

<head>

<title>TransitOps Vehicle Registry</title>


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;

}



body{

background:#0f172a;

color:white;

padding:30px;

}




.header{

display:flex;

justify-content:space-between;

align-items:center;

}



.header h1{

color:#00ffcc;

}




.container{

margin-top:30px;

display:grid;

grid-template-columns:350px 1fr;

gap:25px;

}




.card{

background:#1e293b;

padding:25px;

border-radius:20px;

box-shadow:0 10px 30px black;

}




label{

display:block;

margin-top:15px;

}



input,select{

width:100%;

padding:12px;

margin-top:8px;

border-radius:10px;

border:none;

}




button{


margin-top:20px;

padding:12px;

width:100%;

border:none;

border-radius:20px;

background:#00ffcc;

font-weight:bold;

cursor:pointer;


}




.search{

margin-bottom:20px;

}




table{

width:100%;

border-collapse:collapse;

}



th{

background:#00ffcc;

color:#003333;

padding:12px;

}



td{

padding:12px;

border-bottom:1px solid #334155;

text-align:center;

}



.status{

padding:6px 12px;

border-radius:20px;

background:#22c55e;

color:black;

font-weight:bold;

}


</style>


</head>




<body>



<div class="header">

<h1>
🚍 Vehicle Registry
</h1>


<p>
TransitOps Fleet Management
</p>


</div>





<div class="container">



<!-- Add Vehicle -->

<div class="card">


<h2>
Add Vehicle
</h2>



<label>
Registration Number
</label>

<input id="reg"
placeholder="TS 08 HK 2058">



<label>
Vehicle Model
</label>

<input id="model"
placeholder="Ashok Leyland">



<label>
Vehicle Type
</label>


<select id="type">

<option>
Bus
</option>

<option>
Truck
</option>

<option>
Van
</option>

</select>




<label>
Capacity
</label>

<input id="capacity"
placeholder="50 Seats / 5000 Kg">





<label>
Fuel Type
</label>


<select id="fuel">

<option>
Diesel
</option>

<option>
Electric
</option>

<option>
CNG
</option>

</select>





<label>
Status
</label>


<select id="status">


<option>
Available
</option>


<option>
On Trip
</option>


<option>
In Shop
</option>


<option>
Retired
</option>


</select>





<button onclick="addVehicle()">

Add Vehicle

</button>


</div>







<!-- Vehicle List -->


<div class="card">


<h2>
Vehicle List
</h2>



<br>


<input class="search"
id="search"
placeholder="Search vehicle number..."
onkeyup="searchVehicle()">





<table>


<thead>

<tr>

<th>
Registration
</th>


<th>
Model
</th>


<th>
Type
</th>


<th>
Capacity
</th>


<th>
Status
</th>


</tr>


</thead>


<tbody id="vehicleTable">


</tbody>


</table>



</div>




</div>







<script>



let vehicles=[


{

reg:"TS 08 HK 2058",

model:"Ashok Leyland",

type:"Bus",

capacity:"50 Seats",

status:"On Trip"

},


{

reg:"AP 09 XY 4521",

model:"Tata Truck",

type:"Truck",

capacity:"5000 Kg",

status:"Available"

}


];





function displayVehicles(data=vehicles){


let table="";


data.forEach(v=>{


table+=`

<tr>

<td>${v.reg}</td>

<td>${v.model}</td>

<td>${v.type}</td>

<td>${v.capacity}</td>

<td>

<span class="status">

${v.status}

</span>

</td>


</tr>

`;



});



document.getElementById("vehicleTable")
.innerHTML=table;


}



displayVehicles();







function addVehicle(){



let vehicle={


reg:reg.value,

model:model.value,

type:type.value,

capacity:capacity.value,

status:status.value


};




vehicles.push(vehicle);



displayVehicles();



alert(
"Vehicle Added Successfully"
);



}








function searchVehicle(){



let value=
search.value.toLowerCase();



let result=
vehicles.filter(v=>

v.reg.toLowerCase()
.includes(value)

);



displayVehicles(result);



}




</script>



</body>


</html>
