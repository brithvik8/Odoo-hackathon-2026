<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TransitOps Vehicle Registry</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#0f172a;color:#fff}
.sidebar{position:fixed;width:250px;height:100vh;background:#111827;padding:25px}
.logo{text-align:center;margin-bottom:30px}.logo h2{color:#00ffcc}
.menu button{width:100%;padding:14px;margin:8px 0;background:#1f2937;color:#fff;border:none;border-radius:10px;text-align:left;cursor:pointer}
.menu button:hover,.active{background:#00ffcc;color:#003333}
.main{margin-left:250px;padding:30px}
.header{display:flex;justify-content:space-between;align-items:center}
.add{background:#00ffcc;color:#003333;border:none;padding:12px 20px;border-radius:20px;cursor:pointer}
input{width:100%;padding:12px;margin:20px 0;border:none;border-radius:10px}
table{width:100%;border-collapse:collapse;background:#1e293b;border-radius:12px;overflow:hidden}
th{background:#00ffcc;color:#003333;padding:12px}
td{padding:12px;border-bottom:1px solid #334155;text-align:center}
</style>
</head>
<body>
<div class="sidebar">
<div class="logo"><h1>🚍</h1><h2>TransitOps</h2></div>
<div class="menu">
<button onclick="location.href='dashboard.html'">📊 Dashboard</button>
<button style="background:#00ffcc;color:black;" class="active">🚍 Vehicle Registry</button>
<button onclick="location.href='drivers_profile.html'">👨‍✈️ Driver Profiles</button>
<button onclick="location.href='trip_dispatcher.html'">🗺 Trip Dispatcher</button>
<button onclick="location.href='maintenance.html'">🔧 Maintenance</button>
<button onclick="location.href='fuel_expenses.html'">⛽ Fuel & Expenses</button>
<button onclick="location.href='report.html'">📈 Reports</button>
<button onclick="location.href='settings.html'">⚙ Settings</button>
</div></div>
<div class="main">
<div class="header"><div><h1>Vehicle Registry</h1><p>Manage Fleet Vehicles</p></div><button class="add" onclick="addVehicle()">+ Add Vehicle</button></div>
<input id="search" onkeyup="searchVehicle()" placeholder="Search Registration Number">
<table>
<thead><tr><th>Registration</th><th>Model</th><th>Type</th><th>Capacity</th><th>Fuel</th><th>Status</th></tr></thead>
<tbody id="vehicleTable"></tbody>
</table>
</div>
<script>
let vehicles=[
{reg:"TS 08 HK 2058",model:"Ashok Leyland",type:"Bus",capacity:"50 Seats",fuel:"Diesel",status:"On Trip"},
{reg:"AP 09 XY 4521",model:"Tata Truck",type:"Truck",capacity:"5000 Kg",fuel:"Diesel",status:"Available"}
];
function display(data=vehicles){
document.getElementById("vehicleTable").innerHTML=data.map(v=>`<tr><td>${v.reg}</td><td>${v.model}</td><td>${v.type}</td><td>${v.capacity}</td><td>${v.fuel}</td><td>${v.status}</td></tr>`).join("");
}
display();
function addVehicle(){
let reg=prompt("Registration Number");
if(!reg)return;
let model=prompt("Model");
let type=prompt("Type");
let cap=prompt("Capacity");
let fuel=prompt("Fuel");
let status=prompt("Status");
vehicles.push({reg:reg,model:model,type:type,capacity:cap,fuel:fuel,status:status});
display();
}
function searchVehicle(){
let s=document.getElementById("search").value.toLowerCase();
display(vehicles.filter(v=>v.reg.toLowerCase().includes(s)));
}
</script>
</body>
</html>
